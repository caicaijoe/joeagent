    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#FFD700" stroke-opacity="0.08"/>
    </pattern>
    <filter id="windowShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="5" dy="5" stdDeviation="0" flood-color="#8A6D3B" flood-opacity="1"/>
    </filter>
  </defs>

