<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGlow" x1="720" y1="0" x2="720" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A210C"/>
      <stop offset="0.36" stop-color="#050505"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="heroGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 390) rotate(90) scale(260 240)">
      <stop stop-color="#FFD700" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metalText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF6BF"/>
      <stop offset="24%" stop-color="#FFE878"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="78%" stop-color="#B98A2D"/>
      <stop offset="100%" stop-color="#FFF1A6"/>
